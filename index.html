<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mappa Sopralluogo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; }
    #header {
      background: #1e5631; color: white; padding: 12px 16px;
      height: 56px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center;
    }
    #header h1 { font-size: 16px; font-weight: bold; }
    #map { position: fixed; top: 56px; left: 0; right: 0; bottom: 80px; }
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; padding: 10px 16px; height: 80px;
      display: flex; flex-direction: column; gap: 6px; z-index: 1000;
    }
    #coords { color: #ccc; font-size: 13px; text-align: center; }
    #btnConferma {
      background: #1e5631; color: white; border: none; border-radius: 6px;
      padding: 10px; font-size: 15px; font-weight: bold; cursor: pointer;
      width: 100%; display: none;
    }
    #btnGPS {
      position: fixed; bottom: 90px; right: 16px; z-index: 1000;
      background: white; border: 2px solid #ccc; border-radius: 50%;
      width: 44px; height: 44px; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #istruzione {
      color: white; background: rgba(0,0,0,0.6); padding: 6px 12px;
      border-radius: 20px; font-size: 13px; position: fixed; top: 66px;
      left: 50%; transform: translateX(-50%); z-index: 1000; white-space: nowrap;
    }
    #overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75); z-index: 3000;
      align-items: center; justify-content: center;
    }
    #overlay.visible { display: flex; }
    #card {
      background: #2a2a2a; border: 2px solid #1e5631;
      border-radius: 12px; padding: 24px; width: 88%; text-align: center;
    }
    #card h2 { color: white; font-size: 17px; margin-bottom: 8px; }
    #card p { color: #aaa; font-size: 13px; margin-bottom: 14px; }
    #codiceTesto {
      color: #4CAF50; font-size: 20px; font-weight: bold;
      background: #1a1a1a; padding: 12px; border-radius: 8px;
      display: block; margin-bottom: 14px; letter-spacing: 1px;
    }
    #btnCopia {
      background: #e67e22; color: white; border: none; border-radius: 6px;
      padding: 12px; font-size: 15px; font-weight: bold;
      cursor: pointer; width: 100%; margin-bottom: 8px;
    }
    #btnChiudi {
      background: #444; color: white; border: none; border-radius: 6px;
      padding: 10px; font-size: 14px; cursor: pointer; width: 100%;
    }
    #msgCopia { color: #4CAF50; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<div id="header">
  <h1>📍 Seleziona posizione sopralluogo</h1>
</div>

<div id="istruzione">Tocca la mappa per posizionare il pin</div>
<div id="map"></div>
<button id="btnGPS">📍</button>

<div id="footer">
  <div id="coords">Nessuna posizione selezionata</div>
  <button id="btnConferma" onclick="mostraCodice()">✅ Conferma posizione</button>
</div>

<div id="overlay">
  <div id="card">
    <h2>📋 Coordinate selezionate</h2>
    <p>Premi il pulsante per copiare le coordinate, poi incollale nell'app Power Apps</p>
    <span id="codiceTesto">-</span>
    <button id="btnCopia" onclick="copiaCoordinate()">📋 Copia coordinate</button>
    <button id="btnChiudi" onclick="chiudiOverlay()">← Torna alla mappa</button>
    <div id="msgCopia">✅ Coordinate copiate negli appunti!</div>
  </div>
</div>

<script>
  var map = L.map('map').setView([45.15, 7.85], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var marker = null;
  var selectedLat = null;
  var selectedLon = null;

  var pinIcon = L.divIcon({ html: '📍', className: '', iconSize: [30,30], iconAnchor: [15,30] });

  map.on('click', function(e) {
    selectedLat = e.latlng.lat.toFixed(6);
    selectedLon = e.latlng.lng.toFixed(6);
    if (marker) { marker.setLatLng(e.latlng); }
    else { marker = L.marker(e.latlng, {icon: pinIcon}).addTo(map); }
    document.getElementById('coords').innerHTML = '<b>Lat:</b> ' + selectedLat + ' &nbsp; <b>Lon:</b> ' + selectedLon;
    document.getElementById('btnConferma').style.display = 'block';
    document.getElementById('istruzione').style.display = 'none';
  });

  function mostraCodice() {
    if (selectedLat && selectedLon) {
      document.getElementById('codiceTesto').textContent = selectedLat + ',' + selectedLon;
      document.getElementById('overlay').classList.add('visible');
      document.getElementById('msgCopia').style.display = 'none';
      document.getElementById('btnCopia').textContent = '📋 Copia coordinate';
      document.getElementById('btnCopia').style.background = '#e67e22';
    }
  }

  function copiaCoordinate() {
    var codice = selectedLat + ',' + selectedLon;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(codice).then(function() {
        document.getElementById('msgCopia').style.display = 'block';
        document.getElementById('btnCopia').textContent = '✅ Copiato!';
        document.getElementById('btnCopia').style.background = '#1e5631';
      });
    } else {
      var el = document.createElement('textarea');
      el.value = codice; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      document.getElementById('msgCopia').style.display = 'block';
      document.getElementById('btnCopia').textContent = '✅ Copiato!';
      document.getElementById('btnCopia').style.background = '#1e5631';
    }
  }

  function chiudiOverlay() {
    document.getElementById('overlay').classList.remove('visible');
  }

  document.getElementById('btnGPS').onclick = function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        map.setView([pos.coords.latitude, pos.coords.longitude], 16);
        L.circle([pos.coords.latitude, pos.coords.longitude], {
          color: '#2196F3', fillColor: '#2196F3', fillOpacity: 0.3, radius: 15
        }).addTo(map);
      }, function() { alert('Impossibile ottenere la posizione GPS.'); });
    }
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      map.setView([pos.coords.latitude, pos.coords.longitude], 16);
    });
  }
</script>
</body>
</html>
